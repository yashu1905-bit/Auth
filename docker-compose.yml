version: "3.9"

services:
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
